<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HYPE Battlefield</title>
    <!-- 与主站共享的 i18n（部署后同域主站提供）-->
    <script src="../i18n.js"></script>
    <script type="module" crossorigin src="/battlefield/assets/index-B1bsFsCA.js"></script>
    <link rel="modulepreload" crossorigin href="/battlefield/assets/three-B4AnyguS.js">
    <link rel="stylesheet" crossorigin href="/battlefield/assets/index-5hdvLfmx.css">
  </head>
  <body>
    <div id="app"></div>

    <!-- Top: live price bar -->
    <div id="top-bar" class="panel">
      <div class="top-left">
        <a href="/index.html" class="brand brand-link">HypeValue</a>
        <nav class="top-nav">
          <a href="/index.html" data-i18n="nav.dashboard">Dashboard</a>
          <a href="/valuation.html" data-i18n="nav.valuation">Valuation</a>
          <a href="/battlefield/index.html" class="active" data-i18n="nav.battle">Battle</a>
        </nav>
        <div class="conn" id="conn-dot" title="feed status">●</div>
      </div>
      <div class="top-center">
        <div class="price" id="ui-price">$—</div>
        <div class="price-meta">
          <span id="ui-change" class="change">—</span>
          <span class="sep">·</span>
          <span id="ui-mark" class="dim">mark —</span>
          <span class="sep">·</span>
          <span id="ui-funding" class="dim">fund —</span>
        </div>
      </div>
      <div class="top-right">
        <div class="stat"><span class="dim" data-i18n="bf.vol24">24h vol</span> <b id="ui-vol">—</b></div>
        <div class="stat"><span class="dim" data-i18n="bf.oi">OI</span> <b id="ui-oi">—</b></div>
        <div class="stat"><span class="dim" data-i18n="bf.source">source</span> <b>Hyperliquid</b></div>
      </div>
    </div>

    <!-- Left: order book depth -->
    <div id="left-panel" class="panel">
      <div class="panel-title" data-i18n="bf.orderbook">ORDER BOOK</div>
      <div class="wall-row">
        <div class="wall wall-buy">
          <div class="wall-label" data-i18n="bf.buyWall">Buy Wall</div>
          <div class="wall-val" id="ui-buywall">$—</div>
        </div>
        <div class="wall wall-sell">
          <div class="wall-label" data-i18n="bf.sellWall">Sell Wall</div>
          <div class="wall-val" id="ui-sellwall">$—</div>
        </div>
      </div>
      <div class="pressure-row">
        <div class="dim" data-i18n="bf.pressure">Pressure</div>
        <div id="ui-pressure" class="pressure">—</div>
      </div>
      <div class="depth-title" data-i18n="bf.depthTitle">Depth (30 lvls)</div>
      <canvas id="ui-depth" width="240" height="120"></canvas>
    </div>

    <!-- Right: market feed -->
    <div id="right-panel" class="panel">
      <div class="panel-title" data-i18n="bf.marketFeed">MARKET FEED</div>
      <div id="ui-feed" class="feed"></div>
    </div>

    <!-- Bottom hint -->
    <div id="hint" data-i18n="bf.hint" data-i18n-html="1">WASD move · drag rotate · scroll zoom · <b>1</b>/<b>2</b>/<b>3</b> camera</div>

    <!-- Camera mode + perf -->
    <div id="cam-panel" class="panel">
      <button class="cam-btn active" data-mode="free"><span data-i18n="bf.camFree">Free</span> <span>1</span></button>
      <button class="cam-btn" data-mode="follow"><span data-i18n="bf.camFollow">Follow</span> <span>2</span></button>
      <button class="cam-btn" data-mode="cinematic"><span data-i18n="bf.camCinematic">Cinematic</span> <span>3</span></button>
    </div>
    <div id="perf" class="panel"><span id="perf-fps">—</span> <span data-i18n="bf.fps">fps</span></div>

  </body>
</html>
