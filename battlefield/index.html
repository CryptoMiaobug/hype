<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HYPE Battlefield</title>
    <!-- 与主站共享的 i18n（部署后同域主站提供）-->
    <script src="../i18n.js"></script>
    <script type="module" crossorigin src="/battlefield/assets/index-Dj10GsqC.js"></script>
    <link rel="modulepreload" crossorigin href="/battlefield/assets/three-B4AnyguS.js">
    <link rel="stylesheet" crossorigin href="/battlefield/assets/index-C7qFgRkm.css">
  </head>
  <body>
    <div id="app"></div>

    <!-- Top: live price bar -->
    <div id="top-bar" class="panel">
      <div class="top-left">
        <a href="/index.html" class="brand brand-link">HypeValue</a>
        <nav class="top-nav">
          <a href="/index.html" data-i18n="nav.dashboard">Dashboard</a>
          <a href="/valuation.html" data-i18n="nav.valuation">Valuation</a>
          <a href="/battlefield/index.html" class="active" data-i18n="nav.battle">Battle</a>
        </nav>
        <div class="conn" id="conn-dot" title="feed status">●</div>
      </div>
      <div class="top-center">
        <div class="price" id="ui-price">$—</div>
        <div class="price-meta">
          <span id="ui-change" class="change">—</span>
          <span class="sep">·</span>
          <span id="ui-mark" class="dim">mark —</span>
          <span class="sep">·</span>
          <span id="ui-funding" class="dim">fund —</span>
        </div>
      </div>
      <div class="top-right">
        <div class="stat"><span class="dim" data-i18n="bf.vol24">24h vol</span> <b id="ui-vol">—</b></div>
        <div class="stat"><span class="dim" data-i18n="bf.oi">OI</span> <b id="ui-oi">—</b></div>
        <div class="stat"><span class="dim" data-i18n="bf.source">source</span> <b>Hyperliquid</b></div>
      </div>
    </div>

    <!-- Left: order book depth -->
    <div id="left-panel" class="panel">
      <div class="panel-title" data-i18n="bf.orderbook">ORDER BOOK</div>
      <div class="wall-row">
        <div class="wall wall-buy">
          <div class="wall-label" data-i18n="bf.buyWall">Buy Wall</div>
          <div class="wall-val" id="ui-buywall">$—</div>
        </div>
        <div class="wall wall-sell">
          <div class="wall-label" data-i18n="bf.sellWall">Sell Wall</div>
          <div class="wall-val" id="ui-sellwall">$—</div>
        </div>
      </div>
      <div class="pressure-row">
        <div class="dim" data-i18n="bf.pressure">Pressure</div>
        <div id="ui-pressure" class="pressure">—</div>
      </div>
      <div class="depth-title" data-i18n="bf.depthTitle">Depth (30 lvls)</div>
      <canvas id="ui-depth" width="240" height="120"></canvas>
    </div>

    <!-- Right: social links (sits above the market feed, same glass style) -->
    <div id="social-panel" class="panel">
      <a href="https://hype.miao77.xyz/index.html" target="_blank" rel="noopener" class="social-link" aria-label="Hyperliquid">
        <svg viewBox="0 0 144 144" width="15" height="15" fill="#97FCE4" aria-hidden="true"><path d="M144 71.6991C144 119.306 114.866 134.582 99.5156 120.98C86.8804 109.889 83.1211 86.4521 64.116 84.0456C39.9942 81.0113 37.9057 113.133 22.0334 113.133C3.5504 113.133 0 86.2428 0 72.4315C0 58.3063 3.96809 39.0542 19.736 39.0542C38.1146 39.0542 39.1588 66.5722 62.132 65.1073C85.0007 63.5379 85.4184 34.8689 100.247 22.6271C113.195 12.0593 144 23.4641 144 71.6991Z"/></svg>
        <span>Hyperliquid</span>
      </a>
      <a href="https://x.com/KaMiaoRich" target="_blank" rel="noopener" class="social-link icon-only" aria-label="@KaMiaoRich on X" title="@KaMiaoRich">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a href="https://t.me/kamiaorich" target="_blank" rel="noopener" class="social-link icon-only" aria-label="@kamiaorich on Telegram" title="@kamiaorich">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      </a>
    </div>

    <!-- Right: market feed -->
    <div id="right-panel" class="panel">
      <div class="panel-title" data-i18n="bf.marketFeed">MARKET FEED</div>
      <div id="ui-feed" class="feed"></div>
    </div>

    <!-- Bottom hint -->
    <div id="hint" data-i18n="bf.hint" data-i18n-html="1">WASD move · drag rotate · scroll zoom · <b>1</b>/<b>2</b>/<b>3</b> camera</div>

    <!-- Camera mode + perf -->
    <div id="cam-panel" class="panel">
      <button class="cam-btn active" data-mode="free"><span data-i18n="bf.camFree">Free</span> <span>1</span></button>
      <button class="cam-btn" data-mode="follow"><span data-i18n="bf.camFollow">Follow</span> <span>2</span></button>
      <button class="cam-btn" data-mode="cinematic"><span data-i18n="bf.camCinematic">Cinematic</span> <span>3</span></button>
    </div>
    <div id="perf" class="panel"><span id="perf-fps">—</span> <span data-i18n="bf.fps">fps</span></div>

  </body>
</html>
